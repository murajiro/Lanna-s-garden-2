<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>O jardim de Alanna 2</title>
    <style>
        :root {
            --ui-pink: #f06292;
            --ui-dark-pink: #ad1457;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #263238;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }

        #game-wrapper {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #1a1a1a;
        }

        #game-container {
            position: relative;
            background: #689f38;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #3e2723;
        }

        #top-bar {
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            width: 90%; height: 50px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px; border: 2px solid var(--ui-pink);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 100;
        }

        .stats { display: flex; align-items: center; gap: 8px; font-weight: bold; color: #f9a825; }
        
        .cards-container { display: flex; gap: 5px; }
        .card {
            width: 42px; height: 42px; background: #fff;
            border: 2px solid #ddd; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        .card.active { border-color: var(--ui-pink); background: #fce4ec; transform: translateY(-3px); }
        .card.disabled { opacity: 0.4; }
        .card-emoji { font-size: 1.2rem; }
        .card-cost { font-size: 0.6rem; color: #333; font-weight: bold; }

        #landscape-msg {
            display: none; position: fixed; inset: 0; background: #ad1457;
            z-index: 1000; color: white; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        @media (orientation: portrait) { #landscape-msg { display: flex; } }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 200; color: white; text-align: center;
        }

        .btn {
            background: var(--ui-pink); color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-weight: bold;
            font-size: 1rem; margin-top: 15px; box-shadow: 0 4px 0 var(--ui-dark-pink);
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ui-dark-pink); }
    </style>
</head>
<body>

<div id="landscape-msg">
    <div style="font-size: 3rem;">📱🔄</div>
    <p>Gire o celular para jogar!</p>
</div>

<div id="game-wrapper">
    <div id="game-container">
        <div id="top-bar">
            <div class="stats">
                <span id="love-count">150</span> ☀️
            </div>
            <div class="cards-container" id="inventory"></div>
            <div id="wave-txt" style="font-size: 0.7rem; color: var(--ui-dark-pink); font-weight: bold;">Onda 1/3</div>
        </div>
        <canvas id="mainCanvas"></canvas>

        <div id="menu-start" class="overlay">
            <h1 style="color: var(--ui-pink); margin: 0;">O Jardim de Alanna 2</h1>
            <p style="font-style: italic; max-width: 300px; font-size: 0.9rem;">Proteja o brilho da princesa contra as sombras do mal.</p>
            <button class="btn" onclick="start()">Entrar no Jardim</button>
        </div>

        <div id="menu-win" class="overlay" style="display:none">
            <h2 style="color: #ffeb3b;">💖 Amor Eterno! 💖</h2>
            <p style="font-size: 0.9rem; padding: 0 20px;">Você defendeu o jardim perfeitamente, minha princesa!</p>
            <button class="btn" onclick="location.reload()">Recomeçar</button>
        </div>
    </div>
</div>

<script>
const ROWS = 5, COLS = 11, GRID_W = 100, GRID_H = 80;
const WIDTH = COLS * GRID_W, HEIGHT = ROWS * GRID_H;

const DATA = {
    'GIRASSOL': { emoji: '🌻', cost: 50, hp: 150, type: 'prod', rate: 10000, color: '#fbc02d' },
    'ROSA': { emoji: '🌹', cost: 100, hp: 200, type: 'atk', dmg: 35, cool: 1500, bullet: '#f06292' },
    'LIRIO': { emoji: '🪷', cost: 50, hp: 800, type: 'tank', color: '#b2dfdb' },
    'HORTENSIA': { emoji: '💠', cost: 175, hp: 350, type: 'atk', dmg: 25, cool: 1800, slow: true, bullet: '#81d4fa' }
};

const ENEMIES = {
    'Sombra': { hp: 100, speed: 0.7, sz: 38, color: '#263238' },
    'Espectro': { hp: 80, speed: 1.5, sz: 32, color: '#6a1b9a' },
    'Nuvem': { hp: 650, speed: 0.4, sz: 55, color: '#455a64' }
};

let canvas, ctx, love = 150, state = 'START', selected = null;
let plants = [], zombies = [], bullets = [], suns = [], misas = [];
let wave = 1, progress = 0, nextZombie = 0, nextSun = 2000;

function setup() {
    canvas = document.getElementById('mainCanvas');
    ctx = canvas.getContext('2d');
    canvas.width = WIDTH; canvas.height = HEIGHT;
    
    resize();
    window.addEventListener('resize', resize);

    const inv = document.getElementById('inventory');
    Object.keys(DATA).forEach(k => {
        const c = document.createElement('div');
        c.className = 'card';
        c.innerHTML = `<span class="card-emoji">${DATA[k].emoji}</span><span class="card-cost">${DATA[k].cost}</span>`;
        c.onclick = () => {
            if(love >= DATA[k].cost) {
                selected = (selected === k) ? null : k;
                updateCards();
            }
        };
        inv.appendChild(c);
    });

    for(let i=0; i<ROWS; i++) misas.push({row: i, x: 25, y: i*GRID_H + GRID_H/2, active: false, used: false});

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scale = WIDTH / rect.width;
        const tx = (e.touches[0].clientX - rect.left) * scale;
        const ty = (e.touches[0].clientY - rect.top) * scale;
        handleClick(tx, ty);
    });
}

function resize() {
    const container = document.getElementById('game-container');
    const wrapper = document.getElementById('game-wrapper');
    const ratio = WIDTH / HEIGHT;
    
    let w = wrapper.clientWidth * 0.95;
    let h = w / ratio;

    if (h > wrapper.clientHeight * 0.95) {
        h = wrapper.clientHeight * 0.95;
        w = h * ratio;
    }

    container.style.width = w + 'px';
    container.style.height = h + 'px';
}

function handleClick(x, y) {
    const sIdx = suns.findIndex(s => Math.hypot(s.x - x, s.y - y) < 50);
    if(sIdx !== -1) { love += 25; suns.splice(sIdx, 1); updateCards(); return; }

    if(selected) {
        const c = Math.floor(x/GRID_W), r = Math.floor(y/GRID_H);
        if(c > 0 && c < COLS && r >= 0 && r < ROWS && !plants.some(p=>p.r===r && p.c===c)) {
            plants.push({r, c, k: selected, x: c*GRID_W+GRID_W/2, y: r*GRID_H+GRID_H/2, hp: DATA[selected].hp, next: 0});
            love -= DATA[selected].cost; selected = null; updateCards();
        }
    }
}

function updateCards() {
    document.querySelectorAll('.card').forEach((c, i) => {
        const k = Object.keys(DATA)[i];
        c.classList.toggle('disabled', love < DATA[k].cost);
        c.classList.toggle('active', selected === k);
    });
    document.getElementById('love-count').innerText = love;
}

function spawn() {
    progress++;
    const r = Math.floor(Math.random()*ROWS);
    const type = wave === 3 && progress > 5 ? 'Nuvem' : (Math.random() > 0.7 ? 'Espectro' : 'Sombra');
    zombies.push({
        ...ENEMIES[type], x: WIDTH + 50, y: r*GRID_H+GRID_H/2, r,
        hp: ENEMIES[type].hp * (1 + wave*0.2), maxHp: ENEMIES[type].hp,
        walk: 0, flash: 0, scale: 1
    });

    const goal = wave === 3 ? 15 : 12;
    if(progress >= goal && wave < 3) {
        wave++; progress = 0;
        document.getElementById('wave-txt').innerText = `Onda ${wave}/3`;
    }
}

function loop(t) {
    if(state !== 'PLAY') return requestAnimationFrame(loop);
    
    // Spawning
    if(t > nextSun) { suns.push({x: 100+Math.random()*(WIDTH-200), y: -50, ty: 100+Math.random()*(HEIGHT-150), l: 400}); nextSun = t + 6000; }
    if(t > nextZombie) { spawn(); nextZombie = t + (4000 - wave*600); }

    // Logic
    bullets.forEach((b, i) => {
        b.x += 10;
        const hit = zombies.find(z => z.r === b.r && Math.abs(z.x - b.x) < 30);
        if(hit) { hit.hp -= b.dmg; hit.flash = 5; bullets.splice(i, 1); }
        else if(b.x > WIDTH) bullets.splice(i, 1);
    });

    zombies.forEach((z, i) => {
        const p = plants.find(p => p.r === z.r && Math.abs(p.x - z.x) < 40);
        if(p) p.hp -= 1;
        else z.x -= z.speed;

        z.walk += 0.1;
        if(z.flash > 0) z.flash--;

        if(z.x < 80) {
            const m = misas.find(m => m.row === z.r && !m.used);
            if(m) m.active = true;
        }
        if(z.x < 10) state = 'LOSE', document.getElementById('menu-lose').style.display = 'flex';
    });

    plants.forEach(p => {
        const d = DATA[p.k];
        if(d.type === 'prod' && t > p.next) { suns.push({x: p.x, y: p.y, ty: p.y+30, l: 300}); p.next = t + d.rate; }
        if(d.type === 'atk' && t > p.next && zombies.some(z => z.r === p.r && z.x > p.x)) {
            bullets.push({x: p.x+20, y: p.y-10, r: p.r, dmg: d.dmg, color: d.bullet});
            p.next = t + d.cool;
        }
    });

    misas.forEach(m => {
        if(m.active) {
            m.x += 12;
            zombies.forEach(z => { if(z.r === m.row && Math.abs(z.x - m.x) < 50) z.hp = 0; });
            if(m.x > WIDTH) m.active = false, m.used = true;
        }
    });

    zombies = zombies.filter(z => z.hp > 0);
    plants = plants.filter(p => p.hp > 0);
    suns.forEach(s => { if(s.y < s.ty) s.y += 2; s.l--; });
    suns = suns.filter(s => s.l > 0);

    if(wave === 3 && progress >= 15 && zombies.length === 0) {
        state = 'WIN'; document.getElementById('menu-win').style.display = 'flex';
    }

    draw(t);
    requestAnimationFrame(loop);
}

function draw(t) {
    ctx.clearRect(0,0,WIDTH, HEIGHT);
    // Grid
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
            ctx.fillStyle = (r+c)%2 === 0 ? '#8bc34a' : '#9ccc65';
            ctx.fillRect(c*GRID_W, r*GRID_H, GRID_W, GRID_H);
        }
    }

    // Plants
    plants.forEach(p => {
        const data = DATA[p.k];
        ctx.save(); ctx.translate(p.x, p.y + 20);
        const bounce = Math.sin(t/300 + p.x)*0.05;
        ctx.scale(1, 1+bounce);
        
        // Bloom
        ctx.fillStyle = data.color || '#e91e63';
        for(let i=0; i<6; i++){
            ctx.rotate(Math.PI/3); ctx.beginPath(); ctx.ellipse(15, 0, 12, 8, 0, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
        ctx.restore();
    });

    // Zombies con Animação Melhorada
    zombies.forEach(z => {
        ctx.save(); ctx.translate(z.x, z.y);
        
        // Animação de caminhada
        const wobble = Math.sin(z.walk) * 5;
        const jump = Math.abs(Math.cos(z.walk)) * 4;
        ctx.translate(0, -jump);
        ctx.rotate(wobble * Math.PI/180);

        // Sombras
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath(); ctx.ellipse(0, z.sz/2 + jump, z.sz/2, 5, 0, 0, Math.PI*2); ctx.fill();

        // Corpo
        ctx.fillStyle = z.flash > 0 ? '#fff' : z.color;
        ctx.fillRect(-z.sz/2, -z.sz/2, z.sz, z.sz);
        
        // Olhos
        ctx.fillStyle = '#ff1744';
        ctx.beginPath(); ctx.arc(-z.sz/4, -z.sz/6, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(z.sz/4, -z.sz/6, 3, 0, Math.PI*2); ctx.fill();
        
        ctx.restore();
    });

    // Bullets
    bullets.forEach(b => {
        ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    });

    // Misas
    misas.forEach(m => {
        if(!m.used) {
            ctx.save(); ctx.translate(m.x, m.y);
            ctx.font = '40px Arial'; ctx.textAlign='center'; ctx.fillText('🐈', 0, 15);
            ctx.restore();
        }
    });

    // Suns
    suns.forEach(s => {
        ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(t/500);
        ctx.fillStyle = '#fdd835';
        for(let i=0; i<8; i++){
            ctx.rotate(Math.PI/4); ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(10,5); ctx.lineTo(10,-5); ctx.fill();
        }
        ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
        ctx.restore();
    });
}

function start() {
    document.getElementById('menu-start').style.display = 'none';
    state = 'PLAY';
    updateCards();
    requestAnimationFrame(loop);
}

window.onload = setup;
</script>

<div id="menu-lose" class="overlay" style="display:none">
    <h1 style="color: #f44336;">O Jardim caiu...</h1>
    <button class="btn" onclick="location.reload()">Tentar de Novo</button>
</div>

</body>
</html>
